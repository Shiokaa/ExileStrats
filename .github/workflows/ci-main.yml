name: CI (main)

# Gate vers main : qualité + build + tests (constitution / DECISIONS.md D25).
on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Tests
        run: npm test
