name: CI (dev)

# Gate vers dev : qualité de base (constitution / DECISIONS.md D25).
on:
  pull_request:
    branches: [dev]

concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Typecheck
        run: npm run typecheck
